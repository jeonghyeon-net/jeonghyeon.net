name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'transformer/**'
      - 'Makefile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: transformer/go.mod
          cache-dependency-path: transformer/go.sum

      - name: Build site
        run: make build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=jeonghyeon-net

      - name: Archive to Wayback Machine
        continue-on-error: true
        run: curl -s "https://web.archive.org/save/https://jeonghyeon.net/sitemap.xml" > /dev/null

      - name: Delete old deployments
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/jeonghyeon-net/deployments")
          echo "$RESPONSE" | jq 'del(.result[].source, .result[].env_vars)' || echo "$RESPONSE"
          OLD_IDS=$(echo "$RESPONSE" | jq -r '(.result // [])[1:][].id')
          for id in $OLD_IDS; do
            curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/jeonghyeon-net/deployments/$id?force=true" > /dev/null
          done
