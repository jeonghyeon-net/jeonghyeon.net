name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'transformer/**'
      - 'Makefile'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: transformer/go.mod
          cache-dependency-path: transformer/go.sum

      - name: Build site
        run: make build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=jeonghyeon-net

      - name: Delete old deployments
        continue-on-error: true
        run: |
          OLD_IDS=$(curl -s -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/jeonghyeon-net/deployments?per_page=100" \
            | jq -r '.result[1:][].id')
          for id in $OLD_IDS; do
            curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/jeonghyeon-net/deployments/$id?force=true" > /dev/null
          done
